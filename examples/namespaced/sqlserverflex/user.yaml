apiVersion: sqlserverflex.stackit.crossplane.io/v1alpha1
kind: Instance
metadata:
  annotations:
    meta.upbound.io/example-id: sqlserverflex/v1alpha1/instance
  labels:
    testing.upbound.io/example-name: example-user
  name: example-user
spec:
  forProvider:
    acl:
    - 193.148.160.0/19
    - 45.129.40.0/21
    backupSchedule: 00 00 * * *
    flavor:
      cpu: 4
      ram: 16
    name: example-instance
    projectId: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    storage:
      class: premium-perf2-stackit
      size: 5
    version: "2022"
---
apiVersion: sqlserverflex.stackit.crossplane.io/v1alpha1
kind: User
metadata:
  annotations:
    meta.upbound.io/example-id: sqlserverflex/v1alpha1/user
  labels:
    testing.upbound.io/example-name: example-user
  name: example-user
spec:
  forProvider:
    instanceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example-user
    projectId: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    roles:
    - '##STACKIT_SQLAgentUser##'
    username: username
