apiVersion: cdn.stackit.crossplane.io/v1alpha1
kind: CustomDomain
metadata:
  labels:
    testing.upbound.io/example-name: example-cdn-domain
  name: example-cdn-domain
spec:
  forProvider:
    projectId: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    name: cdn.example.com
    distributionIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example-cdn
    certificate:
      certificateSecretRef:
        key: tls.crt
        name: cdn-tls-secret
        namespace: crossplane-system
      privateKeySecretRef:
        key: tls.key
        name: cdn-tls-secret
        namespace: crossplane-system
  providerConfigRef:
    name: default
