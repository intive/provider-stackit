apiVersion: compute.stackit.crossplane.io/v1alpha1
kind: Image
metadata:
  annotations:
    meta.upbound.io/example-id: compute/v1alpha1/image
  labels:
    testing.upbound.io/example-name: example-image
  name: example-image
spec:
  forProvider:
    name: example-image
    projectId: <PROJECT-ID>
    diskFormat: qcow2
    localFilePath: ./path/to/image.qcow2
    minDiskSize: 10
    minRam: 512
