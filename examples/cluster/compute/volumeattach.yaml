apiVersion: compute.stackit.crossplane.io/v1alpha1
kind: VolumeAttach
metadata:
  labels:
    testing.upbound.io/example-name: example-volume-attach
  name: example-volume-attach
spec:
  forProvider:
    projectId: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    serverIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example-server
    volumeIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example-volume
  providerConfigRef:
    name: default
