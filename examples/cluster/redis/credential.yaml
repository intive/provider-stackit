apiVersion: redis.stackit.crossplane.io/v1alpha1
kind: Credential
metadata:
  annotations:
    meta.upbound.io/example-id: redis/v1alpha1/credential
  labels:
    testing.upbound.io/example-name: example-redis-credential
  name: example-redis-credential
spec:
  forProvider:
    instanceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example-redis
    projectId: <PROJECT-ID>
  writeConnectionSecretToRef:
    name: redis-credentials
    namespace: default
