apiVersion: sqlserverflex.stackit.crossplane.io/v1alpha1
kind: User
metadata:
  annotations:
    meta.upbound.io/example-id: sqlserverflex/v1alpha1/user
  labels:
    testing.upbound.io/example-name: example-sqlserverflex-user
  name: example-sqlserverflex-user
spec:
  forProvider:
    projectId: <PROJECT-ID>
    instanceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example-sqlserverflex
    username: example-user
    roles:
      - "##STACKIT_LoginManager##"
