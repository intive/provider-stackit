apiVersion: loadbalancer.stackit.crossplane.io/v1alpha1
kind: Loadbalancer
metadata:
  annotations:
    meta.upbound.io/example-id: loadbalancer/v1alpha1/loadbalancer
  labels:
    testing.upbound.io/example-name: example-lb
  name: example-lb
spec:
  forProvider:
    name: example-lb
    projectId: 04ce9fde-6d4b-417d-8b31-f25850aefde6
    planId: p10
    networks:
      - networkId: 04ce9fde-6d4b-417d-8b31-f25850aefde6
        role: ROLE_LISTENERS_AND_TARGETS
    listeners:
      - displayName: http-listener
        port: 80
        protocol: PROTOCOL_TCP
        targetPool: example-target-pool
    targetPools:
      - name: example-target-pool
        targetPort: 80
        activeHealthCheck:
          healthyThreshold: 3
          unhealthyThreshold: 3
          interval: 10s
          timeout: 5s
          intervalJitter: 1s
