apiVersion: rabbitmq.stackit.crossplane.io/v1alpha1
kind: Credential
metadata:
  annotations:
    meta.upbound.io/example-id: rabbitmq/v1alpha1/credential
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    instanceIdRef:
      name: example
    projectId: 12345678-abcd-1234-abcd-123456789abc
  providerConfigRef:
    name: provider-stackit-config
  writeConnectionSecretToRef:
    name: rabbitmq-credentials
    namespace: default
