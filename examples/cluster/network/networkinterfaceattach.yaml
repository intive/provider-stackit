apiVersion: network.stackit.crossplane.io/v1alpha1
kind: NetworkInterfaceAttach
metadata:
  annotations:
    meta.upbound.io/example-id: network/v1alpha1/networkinterfaceattach
  labels:
    testing.upbound.io/example-name: example-nic-attach
  name: example-nic-attach
spec:
  forProvider:
    projectId: <PROJECT-ID>
    serverIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example-server
    networkInterfaceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example-network-interface
