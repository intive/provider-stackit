apiVersion: dns.stackit.crossplane.io/v1alpha1
kind: Zone
metadata:
  labels:
    testing.upbound.io/example-name: example-zone
  name: example-zone
spec:
  forProvider:
    name: example-zone
    dnsName: example.com
    projectId: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    type: primary
    defaultTtl: 300
    contactEmail: admin@example.com
  providerConfigRef:
    name: default
