apiVersion: dns.stackit.crossplane.io/v1alpha1
kind: Zone
metadata:
  annotations:
    meta.upbound.io/example-id: dns/v1alpha1/zone
  labels:
    testing.upbound.io/example-name: example-zone
  name: example-zone
spec:
  forProvider:
    name: example-zone
    dnsName: <DNS-ZONE>
    projectId: <PROJECT-ID>
    type: primary
    defaultTtl: 300
    contactEmail: admin@<DNS-ZONE>
