apiVersion: mongodbflex.stackit.crossplane.io/v1alpha1
kind: Instance
metadata:
  annotations:
    meta.upbound.io/example-id: mongodbflex/v1alpha1/instance
  labels:
    testing.upbound.io/example-name: example-mongodbflex
  name: example-mongodbflex
spec:
  forProvider:
    name: example-mongodbflex
    projectId: 04ce9fde-6d4b-417d-8b31-f25850aefde6
    flavor:
      cpu: 1
      ram: 2
    storage:
      class: premium-perf2-mongodb
      size: 10
    version: "7.0"
    replicas: 1
    backupSchedule: "0 0 * * *"
    acl:
      - 193.148.160.0/19
    options:
      type: "Single"
      pointInTimeWindowHours: 7
