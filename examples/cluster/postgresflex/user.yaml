apiVersion: postgresflex.stackit.crossplane.io/v1alpha1
kind: User
metadata:
  annotations:
    meta.upbound.io/example-id: postgresflex/v1alpha1/user
  labels:
    testing.upbound.io/example-name: example-postgresflex-user
  name: example-postgresflex-user
spec:
  forProvider:
    instanceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example-postgresflex
    projectId: <PROJECT-ID>
    roles:
    - createdb
    username: dbAdmin
