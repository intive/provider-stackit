apiVersion: authorization.stackit.m.crossplane.io/v1alpha1
kind: FolderRoleAssignment
metadata:
  annotations:
    meta.upbound.io/example-id: authorization/v1alpha1/folderroleassignment
  labels:
    testing.upbound.io/example-name: fra
  name: fra
  namespace: crossplane-system
spec:
  forProvider:
    resourceId: ${stackit_resourcemanager_folder.example.folder_id}
    role: reader
    subject: foo.bar@stackit.cloud

---

apiVersion: resourcemanager.stackit.m.crossplane.io/v1alpha1
kind: Folder
metadata:
  annotations:
    meta.upbound.io/example-id: authorization/v1alpha1/folderroleassignment
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: crossplane-system
spec:
  forProvider:
    name: example_folder
    ownerEmail: foo.bar@stackit.cloud
    parentContainerId: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
