apiVersion: mongodbflex.stackit.crossplane.io/v1alpha1
kind: Instance
metadata:
  annotations:
    meta.upbound.io/example-id: mongodbflex/v1alpha1/instance
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    acl:
    - XXX.XXX.XXX.X/XX
    - XX.XXX.XX.X/XX
    backupSchedule: 0 0 * * *
    flavor:
      cpu: 1
      ram: 4
    name: example-instance
    options:
      pointInTimeWindowHours: 30
      snapshotRetentionDays: 3
      type: Single
    projectId: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    replicas: 1
    storage:
      class: class
      size: 10
    version: "7.0"
